name: Build Marketing Worker Installer

on:
  push:
    branches: [main]
    paths:
      - 'dental-clinic-manager/marketing-worker/electron/**'
      - 'dental-clinic-manager/marketing-worker/*.ts'
      - 'dental-clinic-manager/marketing-worker/publisher/**'
      - 'dental-clinic-manager/marketing-worker/utils/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dental-clinic-manager/marketing-worker/electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dental-clinic-manager/marketing-worker/electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install marketing-worker dependencies (for scheduler bundle)
        run: npm ci
        working-directory: dental-clinic-manager/marketing-worker

      - name: Auto-bump worker version
        shell: bash
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # MAJOR.MINOR은 package.json에서 유지, PATCH는 GitHub Actions run_number로 자동 증가
          MAJOR_MINOR=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          NEW_VERSION="${MAJOR_MINOR}.${RUN_NUMBER}"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
          echo "Bumped worker version to $NEW_VERSION"

      - name: Build TypeScript + Scheduler Bundle
        run: npm run build

      - name: Auto bump patch version
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          # 현재 릴리즈 태그 확인
          EXISTING_TAG="worker-v${CURRENT_VERSION}"
          if gh release view "${EXISTING_TAG}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Version ${CURRENT_VERSION} already released, bumping patch..."
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "Bumped to ${NEW_VERSION}"
          else
            echo "Version ${CURRENT_VERSION} not yet released, proceeding..."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Copy Playwright browsers for packaging
        shell: bash
        run: |
          # Playwright 브라우저를 electron-builder가 찾을 수 있는 위치로 복사
          BROWSERS_SRC="$USERPROFILE/AppData/Local/ms-playwright"
          if [ -d "$BROWSERS_SRC" ]; then
            cp -r "$BROWSERS_SRC" playwright-browsers
            echo "Copied browsers from $BROWSERS_SRC"
            ls playwright-browsers/
          else
            echo "Warning: Playwright browsers not found at $BROWSERS_SRC"
            mkdir -p playwright-browsers
          fi

      - name: Build Windows Installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-worker-installer
          path: dental-clinic-manager/marketing-worker/electron/release/*.exe
          retention-days: 30

      - name: Verify Release Published
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="worker-v${VERSION}"
          echo "Verifying release ${TAG}..."
          gh release view "${TAG}" --repo "$GITHUB_REPOSITORY" && echo "Release verified!" || echo "Warning: Release not found, electron-builder may have used a different tag format"
