name: Build Marketing Worker Installer

on:
  push:
    branches: [develop, main]
    paths:
      - 'dental-clinic-manager/marketing-worker/electron/**'
      - 'dental-clinic-manager/marketing-worker/*.ts'
      - 'dental-clinic-manager/marketing-worker/publisher/**'
      - 'dental-clinic-manager/marketing-worker/utils/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dental-clinic-manager/marketing-worker/electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dental-clinic-manager/marketing-worker/electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install marketing-worker dependencies (for scheduler bundle)
        run: npm ci
        working-directory: dental-clinic-manager/marketing-worker

      - name: Auto-bump worker version
        shell: bash
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # MAJOR.MINOR은 package.json에서 유지, PATCH는 GitHub Actions run_number로 자동 증가
          MAJOR_MINOR=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          NEW_VERSION="${MAJOR_MINOR}.${RUN_NUMBER}"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
          echo "Bumped worker version to $NEW_VERSION"

      - name: Build TypeScript + Scheduler Bundle
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Copy Playwright browsers for packaging
        shell: bash
        run: |
          # Playwright 브라우저를 electron-builder가 찾을 수 있는 위치로 복사
          BROWSERS_SRC="$USERPROFILE/AppData/Local/ms-playwright"
          if [ -d "$BROWSERS_SRC" ]; then
            cp -r "$BROWSERS_SRC" playwright-browsers
            echo "Copied browsers from $BROWSERS_SRC"
            ls playwright-browsers/
          else
            echo "Warning: Playwright browsers not found at $BROWSERS_SRC"
            mkdir -p playwright-browsers
          fi

      - name: Build Windows Installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-worker-installer
          path: dental-clinic-manager/marketing-worker/electron/release/*.exe
          retention-days: 30

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXE_FILE=$(ls release/*.exe | head -1)
          if [ -z "$EXE_FILE" ]; then
            echo "No .exe file found"
            exit 1
          fi

          # latest.yml도 함께 업로드 (electron-updater가 필요)
          LATEST_YML=$(ls release/latest.yml 2>/dev/null || echo "")

          VERSION=$(node -p "require('./package.json').version")
          TAG="worker-v${VERSION}"
          FILE_NAME=$(basename "$EXE_FILE")

          echo "Uploading ${FILE_NAME} to GitHub Release ${TAG}..."

          gh release create "${TAG}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "클리닉 매니저 워커 v${VERSION}" \
            --notes "클리닉 매니저 워커 v${VERSION} 업데이트" \
            --prerelease 2>/dev/null || true

          gh release delete-asset "${TAG}" "${FILE_NAME}" \
            --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true

          gh release upload "${TAG}" "${EXE_FILE}" \
            --repo "$GITHUB_REPOSITORY" --clobber

          # latest.yml 업로드 (자동 업데이트에 필수)
          if [ -n "$LATEST_YML" ]; then
            gh release delete-asset "${TAG}" "latest.yml" \
              --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
            gh release upload "${TAG}" "${LATEST_YML}" \
              --repo "$GITHUB_REPOSITORY" --clobber
            echo "Uploaded latest.yml"
          fi

          echo "Upload complete!"
          echo "Download URL: https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${FILE_NAME}"
