publish: null
appId: kr.co.hi-clinic.marketing-worker
productName: 하얀치과 마케팅 워커
artifactName: "hayan-marketing-worker-${version}-setup.${ext}"
copyright: Copyright © 2025 하얀치과

directories:
  output: release
  buildResources: assets

files:
  - dist/**
  - renderer/**
  - assets/**

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: 하얀치과 마케팅 워커
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  runAfterFinish: true
  installerHeaderIcon: assets/icon.ico
  deleteAppDataOnUninstall: true
  displayLanguage: 0x0412

extraResources:
  - from: playwright-browsers
    to: browsers
    filter:
      - chromium-*/**
