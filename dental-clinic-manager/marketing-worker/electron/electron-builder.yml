publish:
  provider: github
  owner: huisu-hwang
  repo: dental-clinic-manager
  releaseType: prerelease
appId: kr.co.hi-clinic.marketing-worker
productName: 클리닉 매니저 워커
artifactName: "clinic-manager-worker-${version}-setup.${ext}"
copyright: Copyright © 2025 하얀치과

directories:
  output: release
  buildResources: assets

files:
  - dist/**
  - renderer/**
  - assets/**

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: 클리닉 매니저 워커
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  runAfterFinish: true
  deleteAppDataOnUninstall: true
  language: 0x0412

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.png
  category: public.app-category.productivity
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

dmg:
  title: 클리닉 매니저 워커
  sign: false

extraResources:
  - from: playwright-browsers
    to: browsers
    filter:
      - chromium-*/**
