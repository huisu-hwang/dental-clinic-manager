<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하얀치과 마케팅 워커 설정</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #09090b;
      padding: 32px 28px 24px;
      font-size: 14px;
      line-height: 1.5;
      user-select: none;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    p.subtitle {
      color: #71717a;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #18181b;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      font-size: 13px;
      color: #09090b;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #a1a1aa;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }

    button {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f4f4f5;
      color: #18181b;
      border-color: #e4e4e7;
      flex: 1;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e4e4e7;
    }

    .btn-primary {
      background: #18181b;
      color: #fff;
      flex: 2;
    }

    .btn-primary:hover:not(:disabled) {
      background: #27272a;
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 18px;
      padding: 6px 10px;
      border-radius: 5px;
      display: none;
    }

    .status.visible { display: block; }
    .status.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .status.error   { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
    .status.info    { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
  </style>
</head>
<body>
  <h1>하얀치과 마케팅 워커 설정</h1>
  <p class="subtitle">대시보드 연결 정보를 입력하세요.</p>

  <div class="field">
    <label for="dashboardUrl">Dashboard URL</label>
    <input type="text" id="dashboardUrl" placeholder="https://www.hi-clinic.co.kr" />
  </div>

  <div class="field">
    <label for="workerApiKey">Worker API Key</label>
    <input type="password" id="workerApiKey" placeholder="API 키를 입력하세요" />
  </div>

  <div class="status" id="statusMsg"></div>

  <div class="actions">
    <button class="btn-secondary" id="btnTest">연결 테스트</button>
    <button class="btn-primary" id="btnSave">저장</button>
  </div>

  <script>
    const electronAPI = window.electronAPI;

    const urlInput = document.getElementById('dashboardUrl');
    const keyInput = document.getElementById('workerApiKey');
    const statusMsg = document.getElementById('statusMsg');
    const btnTest = document.getElementById('btnTest');
    const btnSave = document.getElementById('btnSave');

    function showStatus(type, message) {
      statusMsg.className = 'status visible ' + type;
      statusMsg.textContent = message;
    }

    function setLoading(loading) {
      btnTest.disabled = loading;
      btnSave.disabled = loading;
    }

    // 기존 설정 불러오기
    if (electronAPI && electronAPI.getConfig) {
      electronAPI.getConfig().then(function(cfg) {
        if (cfg && cfg.dashboardUrl) urlInput.value = cfg.dashboardUrl;
        if (cfg && cfg.workerApiKey) keyInput.value = cfg.workerApiKey;
      }).catch(function() {});
    }

    btnTest.addEventListener('click', async function() {
      const dashboardUrl = urlInput.value.trim();
      const workerApiKey = keyInput.value.trim();

      if (!dashboardUrl || !workerApiKey) {
        showStatus('error', 'URL과 API 키를 모두 입력해주세요.');
        return;
      }

      setLoading(true);
      showStatus('info', '연결 테스트 중...');

      try {
        const result = await electronAPI.testConnection({ dashboardUrl, workerApiKey });
        if (result.success) {
          showStatus('success', result.message || '연결 성공!');
        } else {
          showStatus('error', result.message || '연결 실패');
        }
      } catch (err) {
        showStatus('error', '오류: ' + (err.message || String(err)));
      } finally {
        setLoading(false);
      }
    });

    btnSave.addEventListener('click', async function() {
      const dashboardUrl = urlInput.value.trim();
      const workerApiKey = keyInput.value.trim();

      if (!dashboardUrl || !workerApiKey) {
        showStatus('error', 'URL과 API 키를 모두 입력해주세요.');
        return;
      }

      setLoading(true);
      showStatus('info', '저장 중...');

      try {
        const result = await electronAPI.saveConfig({ dashboardUrl, workerApiKey });
        if (result.success) {
          showStatus('success', '저장 완료! 워커를 시작합니다...');
        } else {
          showStatus('error', result.message || '저장 실패');
          setLoading(false);
        }
      } catch (err) {
        showStatus('error', '오류: ' + (err.message || String(err)));
        setLoading(false);
      }
    });
  </script>
</body>
</html>
